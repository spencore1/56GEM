<style>
  @import url('https://fonts.googleapis.com/css2?family=Gilda+Display&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');

  /*
    All rules are scoped to .gov-map-container so they cannot
    bleed into surrounding Squarespace page styles.
    No global resets are applied.
  */

  .gov-map-container {
    font-family: 'PT Serif', Georgia, serif;
    width: 100%;
    color: #1E293B;
    position: relative; /* needed for absolute tooltip positioning */
  }

  /* Inherit box-sizing from container only */
  .gov-map-container *,
  .gov-map-container *::before,
  .gov-map-container *::after {
    box-sizing: border-box;
  }

  /* ── Map wrapper ── */
  .gov-map-container .map-svg-wrapper {
    width: 100%;
    background: transparent;
    border-radius: 8px;
    border: 1px solid #E2E8F0;
    line-height: 0; /* collapses whitespace gap below inline SVG */
  }

  /* SVG sizes relative to its container div, not the viewport */
  .gov-map-container .map-svg-wrapper svg {
    display: block;
    width: 100%;
    height: auto; /* scales proportionally from the viewBox aspect ratio */
  }

  /* ── State paths ── */
  .gov-map-container .state {
    fill: #AEBDCC;       /* default: inactive state gray */
    stroke: #ffffff;
    stroke-width: 0.6;
    cursor: pointer;
    transition: fill 0.12s ease;
  }

  /* Hover fill is handled by JS mouseover/mouseout to brighten the data color */

  /* Selected: dark outline only — fill stays data-driven */
  .gov-map-container .state.is-selected {
    stroke: #1E293B;
    stroke-width: 2;
  }

  /* ── Stats bar ── */
  .gov-map-container .stats-bar {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .gov-map-container .stat-box {
    flex: 1 1 130px;
    background: #FFFFFF;
    border: 0.5px solid #E2E8F0;
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .gov-map-container .stat-box::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .gov-map-container .stat-value {
    display: block;
    font-size: 1.875rem;
    font-weight: 700;
    color: #1E293B;
    line-height: 1;
    margin-bottom: 5px;
    font-family: 'Gilda Display', serif;
    font-variant-numeric: tabular-nums;
  }

  .gov-map-container .stat-label {
    display: block;
    font-size: 0.7rem;
    color: #64748B;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.45;
  }

  /* Colored stat box variants */
  .gov-map-container .stat-box--neutral::before { background: #CBD5E1; }
  .gov-map-container .stat-box--red::before     { background: #DC2626; }
  .gov-map-container .stat-box--blue::before    { background: #2563EB; }
  .gov-map-container .stat-box--gold::before    { background: #3D1A6B; }
  .gov-map-container .stat-box--red  .stat-value { color: #9B1C1C; }
  .gov-map-container .stat-box--blue .stat-value { color: #1E3A8A; }
  .gov-map-container .stat-box--gold .stat-value { color: #3D1A6B; }

  /* ── Rating legend ── */
  .gov-map-container .rating-legend {
    margin-top: 10px;
    display: flex;
    border-radius: 10px;
    overflow: hidden;
    border: 0.5px solid #E2E8F0;
  }

  .gov-map-container .legend-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px;
    gap: 5px;
    background: white;
    border-right: 0.5px solid #E2E8F0;
  }

  .gov-map-container .legend-item:last-child {
    border-right: none;
  }

  .gov-map-container .legend-swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .gov-map-container .legend-label {
    font-size: 10px;
    font-weight: 500;
    color: #64748B;
  }

  .gov-map-container .legend-updated {
    margin: 7px 0 0;
    font-size: 0.8rem;
    color: #94A3B8;
    line-height: 1.5;
  }

  /* ── Detail panel — modal overlay ── */
  .gov-map-container .detail-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 680px;
    max-width: calc(100vw - 32px);
    min-width: 320px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 24px;
    background: #F8FAFC;
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    z-index: 1000;
  }

  /* ── Modal backdrop ── */
  .gov-map-container .detail-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.35);
    z-index: 999;
    cursor: pointer;
  }

  /* ── Modal close button ── */
  .gov-map-container .detail-close-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 20px;
    color: #666;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  .gov-map-container .detail-close-btn:hover {
    color: #000;
  }

  .gov-map-container .detail-placeholder {
    color: #94A3B8;
    font-size: 0.8rem;
    margin: 0;
    width: 100%;
    text-align: center;
  }

  .gov-map-container .detail-state-name {
    font-size: 1.375rem;
    font-weight: 600;
    color: #1E293B;
    margin: 0 0 6px;
    font-family: 'Gilda Display', serif;
  }

  .gov-map-container .detail-body {
    color: #64748B;
    font-size: 0.875rem;
    margin: 0;
    line-height: 1.55;
  }

  /* ── Floating tooltip ── */
  .gov-map-container .gov-tooltip {
    display: none;
    position: absolute;
    z-index: 10;
    pointer-events: none;
    background: #1E293B;
    color: #F8FAFC;
    border-radius: 10px;
    padding: 10px 13px;
    font-size: 0.8rem;
    line-height: 1.5;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    max-width: 230px;
    min-width: 160px;
  }

  .gov-map-container .gov-tooltip .tt-state {
    font-weight: 700;
    font-size: 0.875rem;
    margin-bottom: 2px;
  }

  .gov-map-container .gov-tooltip .tt-rating {
    font-size: 0.73rem;
    color: #94A3B8;
    margin-bottom: 7px;
  }

  .gov-map-container .gov-tooltip .tt-candidate-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 0.75rem;
    margin-bottom: 2px;
    line-height: 1.4;
  }

  .gov-map-container .gov-tooltip .tt-party-r { color: #FCA5A5; }
  .gov-map-container .gov-tooltip .tt-party-d { color: #93C5FD; }
  .gov-map-container .gov-tooltip .tt-party-o { color: #D9F99D; }

  .gov-map-container .gov-tooltip .tt-issues {
    font-size: 0.72rem;
    color: #94A3B8;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 5px;
    margin-top: 5px;
  }

  /* ── Detail panel — expanded content ── */
  .gov-map-container .detail-panel.has-content {
    align-items: flex-start;
  }

  .gov-map-container .dp-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .gov-map-container .dp-rating-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    color: #fff;
  }

  .gov-map-container .dp-tag {
    display: inline-block;
    font-size: 13px;
    color: #64748B;
    padding: 6px 12px;
    border: 1px solid #E2E8F0;
    border-radius: 6px;
  }

  .gov-map-container .dp-section-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #000000;
    margin: 0 0 5px;
  }

  .gov-map-container .dp-candidate-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 10px;
    background: #F8FAFC;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  .gov-map-container .dp-candidate-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .gov-map-container .dp-candidate-link {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    color: #3B82F6;
    text-decoration: underline;
    text-align: left;
    font-family: inherit;
  }

  .gov-map-container .dp-incumbent-tag {
    font-size: 0.68rem;
    color: #64748B;
    background: #F1F5F9;
    padding: 1px 5px;
    border-radius: 8px;
  }

  .gov-map-container .dp-meta {
    margin-left: auto;
    font-size: 0.78rem;
    color: #64748B;
    white-space: nowrap;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .gov-map-container .dp-issue-chip {
    display: inline-block;
    font-size: 0.73rem;
    background: #F1F5F9;
    color: #475569;
    padding: 3px 9px;
    border-radius: 20px;
    border: 0.5px solid #E2E8F0;
  }

  .gov-map-container .dp-profile-placeholder {
    background: #F8FAFC;
    border: 1px dashed #CBD5E1;
    border-radius: 6px;
    padding: 10px 14px;
    text-align: center;
    font-size: 0.8rem;
    color: #94A3B8;
    font-style: italic;
    margin-top: 4px;
  }

  /* ── Candidate profile section ── */
  .gov-map-container .dp-profile-section {
    margin-top: 10px;
    border-left: 3px solid #94A3B8;
    border-radius: 0 6px 6px 0;
    background: #F1F5F9;
    padding: 12px 14px 12px 14px;
  }

  .gov-map-container .dp-profile-header {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .gov-map-container .dp-profile-name {
    font-weight: 600;
    font-size: 0.925rem;
    color: #1E293B;
  }

  .gov-map-container .dp-profile-party {
    font-size: 0.78rem;
    color: #64748B;
  }

  .gov-map-container .dp-profile-bio {
    font-size: 0.84rem;
    color: #475569;
    line-height: 1.55;
    margin: 0 0 10px;
    max-height: 120px;
    overflow-y: auto;
  }

  .gov-map-container .dp-profile-issues {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .gov-map-container .dp-profile-stats {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: #64748B;
    margin-top: 10px;
  }

  .gov-map-container .dp-profile-stat-label {
    font-weight: 600;
    color: #475569;
  }

  .gov-map-container .dp-profile-link {
    color: #3B82F6;
    text-decoration: none;
  }

  .gov-map-container .dp-profile-link:hover {
    text-decoration: underline;
  }

  /* ── Responsive — tablet (600–959 px) ── */
  @media (max-width: 959px) {
  }

  /* ── Responsive — mobile (< 600 px) ── */
  @media (max-width: 599px) {
    /* Stats bar: force exactly 2 columns */
    .gov-map-container .stats-bar {
      gap: 10px;
    }
    .gov-map-container .stat-box {
      flex: 1 1 calc(50% - 5px);
      min-width: 0;
      padding: 12px 8px;
    }
    .gov-map-container .stat-value {
      font-size: 1.5rem;
    }

    /* Detail panel modal: tighter padding on mobile */
    .gov-map-container .detail-panel {
      padding: 16px;
    }

    /* Candidate row: allow meta to wrap rather than overflow */
    .gov-map-container .dp-candidate-row {
      flex-wrap: wrap;
      gap: 4px;
    }
    .gov-map-container .dp-meta {
      margin-left: 0;
      white-space: normal;
    }

    /* Profile section: tighter padding */
    .gov-map-container .dp-profile-section {
      padding: 10px 12px;
    }

    /* Legend: tighter on mobile */
    .gov-map-container .rating-legend {
      flex-wrap: wrap;
    }
  }
</style>

<div class="gov-map-container">

  <!-- D3 injects the <svg> here -->
  <div class="map-svg-wrapper" id="govMapWrapper"></div>

  <!-- Stats bar — values will be populated in Phase 2 -->
  <div class="stats-bar">
    <div class="stat-box">
      <span class="stat-value" id="stat-up">--</span>
      <span class="stat-label">Governors Up&nbsp;for Election</span>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="stat-limited">--</span>
      <span class="stat-label">Term-Limited Seats</span>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="stat-incumbents">--</span>
      <span class="stat-label">Incumbents Running</span>
    </div>
    <div class="stat-box stat-box--gold">
      <span class="stat-value" id="stat-tossup">--</span>
      <span class="stat-label">Toss-Up Races</span>
    </div>
    <div class="stat-box stat-box--red">
      <span class="stat-value" id="stat-safe-r">--</span>
      <span class="stat-label">Safe / Likely R</span>
    </div>
    <div class="stat-box stat-box--blue">
      <span class="stat-value" id="stat-safe-d">--</span>
      <span class="stat-label">Safe / Likely D</span>
    </div>
  </div>

  <!-- Rating legend -->
  <div class="rating-legend">

oint and Turning \nPoint Faith events, often alongside my bride, Eileen. To this day, I \nkeep the first photo from that morning as a reminder that God weaves \nevery encounter into His greater plan.\nWhy I'm Running for Governor\nI\n understand hardship because I’ve lived it. I understand leadership \nbecause I’ve practiced it — in war zones, on rescue missions, and while \nrebuilding communities. Now, I’m taking on a new mission, right here at \nhome, for the people I love and for the Colorado where my children and \ngrandchildren will hopefully raise their own families.\nColorado\n has grown cold. Crime is rampant. Faith and freedom are under attack. \nFamilies are struggling under the weight of rising costs and government \noverreach. That is why I am running for Governor of Colorado — to \nrestore safety, strength, and moral clarity to the state I call home.\n\nMy wife and I have been married \nfor 37 years. We’ve raised five children and are now proud grandparents.\n While some of my older children have moved away from Colorado, this \nstate is my home. Nearly six million Coloradans also call this place \nhome, and I want to ensure that its beauty is preserved, its safety \nrestored, its prosperity renewed, and that Colorado once again becomes a\n freedom-loving, faith-honoring, family-centered state — one that future\n generations will be proud to inherit.\n\nWe have faced challenges before.\n But together, we can renew Colorado’s promise — a place where hard work\n is rewarded, families are supported, and freedom is defended.\nWith Gratitude and Determination,“I’m not running to talk about what politicians have failed to do–I’m running because of what we must do together.”",

      // a standard GeoJSON FeatureCollection that D3's path generator
      // understands. Each feature represents one state.
      var features = topojson.feature(us, us.objects.states).features;

      // ── Draw one <path> element per state ──
      svg.selectAll('.state')
        .data(features)
        .join('path')
          .attr('class', 'state')
          // ID uses FIPS with a prefix so the value is a valid CSS selector.
          // Raw numeric IDs (e.g. id="01") require escaping in CSS/querySelector.
          .attr('id', function (d) {
            return 'fips-' + String(d.id).padStart(2, '0');
          })
          // data-state stores the abbreviation for Phase 2 event hooks
          .attr('data-state', function (d) {
            return FIPS_TO_ABBR[String(d.id).padStart(2, '0')] || '';
          })
          .attr('d', pathGen)
          .style('fill', function (d) {
            var abbr = FIPS_TO_ABBR[String(d.id).padStart(2, '0')] || '';
            return getBaseColor(abbr);
          })
          .on('mouseover', handleStateMouseover)
          .on('mouseout',  handleStateMouseout)
          .on('mousemove', handleStateMousemove)
          .on('click',     handleStateClick);

      // ── Draw internal state borders as a single mesh path ──
      // topojson.mesh() with (a, b) => a !== b generates only the arcs
      // shared between *different* states, which avoids double-stroking
      // interior boundaries and gives a cleaner look than stroking each
      // state polygon individually.
      svg.append('path')
        .datum(topojson.mesh(us, us.objects.states, function (a, b) {
          return a !== b;
        }))
        .attr('fill', 'none')
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 0.5)
        .attr('stroke-linejoin', 'round')
        .attr('pointer-events', 'none'); // don't block clicks on states below

        'font-family:sans-serif;font-size:0.9rem;">' +

    });

  // ============================================================
  // CLICK HANDLER
  // ============================================================
  function handleStateClick(event, d) {
    var fips = String(d.id).padStart(2, '0');
    var abbr = FIPS_TO_ABBR[fips];
    if (!abbr) return;

    // Clear the previous selection
    if (activeAbbr) {
      d3.select('[data-state="' + activeAbbr + '"]').classed('is-selected', false);
    }

    // Clicking the already-active state toggles it off
    if (abbr === activeAbbr) {
      activeAbbr = null;
      renderDefault();
      return;
    }

    // Apply new selection
    activeAbbr = abbr;
    d3.select(this).classed('is-selected', true);
    renderStateDetail(abbr);
  }

  // ============================================================
  // DETAIL PANEL
  // ============================================================
  function closeModal() {
    var panel    = document.getElementById('govDetailPanel');
    var backdrop = document.getElementById('govDetailBackdrop');
    panel.style.display    = 'none';
    backdrop.style.display = 'none';
    activeAbbr = null;
    d3.selectAll('.state-path').classed('is-selected', false);
    activeProfileCandidate = null;
  }

  document.getElementById('govDetailClose').addEventListener('click', closeModal);
  document.getElementById('govDetailBackdrop').addEventListener('click', closeModal);

  function renderDefault() {
    closeModal();
  }

  function ratingBadgeColor(rating) {
    if (!rating) return '#64748B';
    if (rating === 'Safe R')   return '#9B1C1C';   // deep maroon
    if (rating === 'Likely R') return '#DC2626';   // vivid red
    if (rating === 'Lean R')   return '#EF4444';   // bright red
    if (rating === 'Toss-Up')  return '#3D1A6B';   // deep purple
    if (rating === 'Lean D')   return '#3B82F6';   // bright blue
    if (rating === 'Likely D') return '#1D4ED8';   // deeper blue
    if (rating === 'Safe D')   return '#1E3A8A';   // deep navy
    return '#64748B';
  }

  function renderStateDetail(abbr) {
    var panel    = document.getElementById('govDetailPanel');
    var backdrop = document.getElementById('govDetailBackdrop');
    var name     = ABBR_TO_NAME[abbr] || abbr;
    var data     = stateData[abbr];

    var closeBtn = '<button class="detail-close-btn" id="govDetailClose" aria-label="Close">&times;</button>';

    if (!data || !data.active) {
      panel.classList.remove('has-content');
      panel.style.borderTop = '';
      panel.innerHTML = closeBtn +
        '<div><p class="detail-state-name">' + name + '</p>' +
        '<p class="detail-body">No 2026 gubernatorial race in ' + name + '.</p></div>';
      document.getElementById('govDetailClose').addEventListener('click', closeModal);
      backdrop.style.display = 'block';
      panel.style.display    = 'block';
      return;
    }

    panel.classList.add('has-content');
    panel.style.borderTop = '4px solid ' + getBaseColor(abbr);

    var html = '<div style="width:100%">';

    // ── Header ──
    html += '<div class="dp-header">';
    html += '<span class="detail-state-name" style="margin:0">' + name + '</span>';
    html += '<span class="dp-rating-badge" style="background:' + ratingBadgeColor(data.raceRating) + '">' +
              (data.raceRating || '') + '</span>';
    if (data.termLimited)      html += '<span class="dp-tag">Term-Limited Seat</span>';
    if (data.incumbentRunning) html += '<span class="dp-tag">Incumbent Running</span>';
    html += '</div>';

    // Context bar
    var contextItems = [];
    if (data.legislature)    contextItems.push({ label: data.legislature });
    if (data.pvi)            contextItems.push({ label: 'PVI: ' + data.pvi });
    if (data.presMargin2024) contextItems.push({ label: '2024 Pres: ' + data.presMargin2024 });
    if (data.primaryDate)    contextItems.push({ label: 'Primary: ' + data.primaryDate });

    if (contextItems.length) {
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
      contextItems.forEach(function(item) {
        html += '<span style="font-size:13px;padding:6px 12px;border-radius:6px;' +
                'background:#F1F5F9;color:#475569;font-weight:500">' + item.label + '</span>';
      });
      html += '</div>';
    }

    // ── Summary ──
    if (data.summary) {
      html += '<p class="detail-body" style="margin-bottom:14px">' + data.summary + '</p>';
    }

    // ── Candidates ──
    if (data.candidates && data.candidates.length) {
      html += '<p class="dp-section-label">Candidates</p>';
      html += '<div style="margin-bottom:14px">';
      data.candidates.forEach(function (c) {
        var dotColor = c.party === 'R' ? '#EF4444' : (c.party === 'D' ? '#3B82F6' : '#8B5CF6');
        var polling  = c.pollingAvg > 0 ? c.pollingAvg.toFixed(1) + '%' : '—';
        html += '<div class="dp-candidate-row">';
        html += '<span class="dp-candidate-dot" style="background:' + dotColor + '"></span>';
        html += '<button class="dp-candidate-link" data-abbr="' + abbr +
                '" data-candidate="' + c.name + '">' + c.name + '</button>';
        if (c.incumbent) html += '<span class="dp-incumbent-tag">Incumbent</span>';
        html += '<span class="dp-meta">' + c.party + ' · ' + polling + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // ── Top Issues ──
    if (data.topIssues && data.topIssues.length) {
      html += '<p class="dp-section-label">Key Issues</p>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
      data.topIssues.forEach(function (issue) {
        html += '<span class="dp-issue-chip">' + issue + '</span>';
      });
      html += '</div>';
    }

    // Election history
    if (data.lastGovMargin || data.presMargin2024) {
      html += '<p class="dp-section-label">Election History</p>';
      html += '<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">';
      if (data.lastGovMargin) {
        html += '<div style="font-size:12px;color:#64748B">' +
                '<span style="font-weight:600;color:#1E293B">' + data.lastGovMargin + '</span>' +
                ' 2022 Gov</div>';
      }
      if (data.presMargin2024) {
        html += '<div style="font-size:12px;color:#64748B">' +
                '<span style="font-weight:600;color:#1E293B">' + data.presMargin2024 + '</span>' +
                ' 2024 Pres</div>';
      }
      if (data.currentGov) {
        var govDot = data.currentGovParty === 'R' ? '#EF4444' : (data.currentGovParty === 'D' ? '#3B82F6' : '#8B5CF6');
        html += '<div style="font-size:12px;color:#64748B">' +
                'Gov: <span style="font-weight:600;color:' + govDot + '">' + data.currentGov + '</span></div>';
      }
      html += '</div>';
    }

    // ── Candidate profile section (Phase 4) ──
    html += '<div id="dp-profile-section"></div>';

    html += '</div>';
    panel.innerHTML = closeBtn + html;
    document.getElementById('govDetailClose').addEventListener('click', closeModal);
    backdrop.style.display = 'block';
    panel.style.display    = 'block';
    activeProfileCandidate = null;
  }

  // ============================================================
  // CANDIDATE PROFILE — event delegation + rendering (Phase 4)
  // Attached once to the stable container; survives panel rebuilds.
  // ============================================================
  document.getElementById('govDetailPanel').addEventListener('click', function (e) {
    var btn = e.target.closest('.dp-candidate-link');
    if (!btn) return;
    var abbr          = btn.getAttribute('data-abbr');
    var candidateName = btn.getAttribute('data-candidate');
    handleCandidateClick(abbr, candidateName);
  });

  function handleCandidateClick(abbr, candidateName) {
    var section = document.getElementById('dp-profile-section');
    if (!section) return;

    // Toggle: same candidate collapses the profile
    if (activeProfileCandidate === candidateName) {
      activeProfileCandidate = null;
      section.innerHTML = '';
      return;
    }

    activeProfileCandidate = candidateName;
    section.innerHTML = buildCandidateProfileHTML(abbr, candidateName);
  }

  function buildCandidateProfileHTML(abbr, candidateName) {
    var data = stateData[abbr];
    if (!data) return '';
    var c = null;
    for (var i = 0; i < data.candidates.length; i++) {
      if (data.candidates[i].name === candidateName) { c = data.candidates[i]; break; }
    }
    if (!c) return '';

    var partyColor = c.party === 'R' ? '#EF4444' : (c.party === 'D' ? '#3B82F6' : '#8B5CF6');
    var partyLabel = c.party === 'R' ? 'Republican' : (c.party === 'D' ? 'Democrat' : 'Independent');

    var html = '<div class="dp-profile-section" style="border-left-color:' + partyColor + '">';

    // Header: name · party dot · party label · incumbent badge
    html += '<div class="dp-profile-header">';
    html += '<span class="dp-profile-name">' + c.name + '</span>';
    html += '<span class="dp-candidate-dot" style="background:' + partyColor + '"></span>';
    html += '<span class="dp-profile-party">' + partyLabel + '</span>';
    if (c.incumbent) {
      html += '<span class="dp-incumbent-tag">Incumbent</span>';
    }
    html += '</div>';

    // Bio
    if (c.bio) {
      html += '<p class="dp-profile-bio">' + c.bio + '</p>';
      html += '<span style="display:block;font-size:11px;color:#888;font-style:italic;margin-top:8px;border-top:1px solid #eee;padding-top:6px">Via campaign site</span>';
    }

    // Key issues chips
    if (c.keyIssues && c.keyIssues.length) {
      html += '<p class="dp-section-label">Key Issues</p>';
      html += '<div class="dp-profile-issues">';
      c.keyIssues.forEach(function (issue) {
        html += '<span class="dp-issue-chip">' + issue + '</span>';
      });
      html += '</div>';
    }

    // Polling avg + website
    html += '<div class="dp-profile-stats">';
    var polling = c.pollingAvg > 0 ? c.pollingAvg.toFixed(1) + '%' : 'Polling unavailable';
    html += '<span><span class="dp-profile-stat-label">Polling avg:</span> ' + polling + '</span>';
    if (c.website) {
      html += '<span><a href="' + c.website + '" target="_blank" rel="noopener noreferrer" ' +
              'class="dp-profile-link">Campaign website</a></span>';
    } else {
      html += '<span><span class="dp-profile-stat-label">Website:</span> Not available</span>';
    }
    html += '</div>';

    html += '</div>';
    return html;
  }

  }, 300);

})();
</script>

</body>
</html>
